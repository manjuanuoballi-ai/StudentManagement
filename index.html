<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>"
    />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand__logo">🎓</span>
          <span class="brand__name">Campus<strong>SMS</strong></span>
        </div>
        <nav class="nav">
          <a class="nav__link" href="#/">📊 Dashboard</a>
          <a class="nav__link" href="#/students">👨‍🎓 Students</a>
          <a class="nav__link" href="#/courses">📚 Courses</a>
          <a class="nav__link" href="#/enrollments">📝 Enrollments</a>
          <a class="nav__link" href="#/assistant">🤖 AI Assistant</a>
        </nav>
        <div class="sidebar__foot">
          <button id="reset-data" class="btn btn--ghost btn--block">↺ Reset sample data</button>
          <p class="sidebar__note">Data is stored locally in your browser.</p>
        </div>
      </aside>

      <main class="main">
        <div id="app" class="container"></div>
      </main>
    </div>

    <div id="modal-root" class="modal-root"></div>
    <div id="toast-root" class="toast-root"></div>

    <script src="js/store.js"></script>
    <script src="js/assistant.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
